<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mielina — Tu proyecto</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,500;12..96,600;12..96,700;12..96,800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#060708;--bg2:#0D0F13;--bg3:#141720;
  --lime:#AACC2A;--lime2:#C8EE40;--rose:#C4386B;--rose2:#E04E82;
  --white:#EDEAE2;--muted:#5A5D6A;--muted2:#8A8D9A;
  --border:rgba(255,255,255,0.06);--border2:rgba(255,255,255,0.11);
}
html,body{min-height:100%;background:var(--bg);color:var(--white);font-family:'DM Sans',sans-serif;-webkit-font-smoothing:antialiased}

/* TOPBAR */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:1rem 1.75rem;border-bottom:0.5px solid var(--border);background:rgba(6,7,8,0.9);backdrop-filter:blur(12px);position:sticky;top:0;z-index:10}
.topbar-logo{font-family:'Bricolage Grotesque',sans-serif;font-size:18px;font-weight:800;background:linear-gradient(100deg,var(--lime),var(--rose));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.topbar-contact{display:flex;align-items:center;gap:10px}
.contact-avatar{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--lime),var(--rose));display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#060708;flex-shrink:0}
.contact-info{font-size:12px}
.contact-name{color:var(--white);font-weight:500}
.contact-role{color:var(--muted2)}
.contact-btn{font-size:11px;padding:6px 14px;border-radius:99px;border:0.5px solid var(--border2);background:transparent;color:var(--muted2);cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .2s;text-decoration:none;display:inline-block}
.contact-btn:hover{color:var(--white);border-color:rgba(255,255,255,.3)}

/* HERO */
.hero{padding:2.5rem 1.75rem 1.5rem;border-bottom:0.5px solid var(--border)}
.hero-top{display:flex;align-items:flex-start;justify-content:space-between;gap:1rem;flex-wrap:wrap;margin-bottom:1.25rem}
.empresa-name{font-family:'Bricolage Grotesque',sans-serif;font-size:24px;font-weight:800;letter-spacing:-.02em;margin-bottom:.25rem}
.proyecto-name{font-size:14px;color:var(--muted2)}
.badge{display:inline-block;font-size:11px;letter-spacing:.06em;text-transform:uppercase;padding:4px 12px;border-radius:99px;font-weight:500}
.b-lime{background:rgba(170,204,42,.1);color:var(--lime)}
.b-rose{background:rgba(196,56,107,.1);color:var(--rose2)}
.b-blue{background:rgba(100,150,255,.1);color:#88aaff}
.b-gray{background:rgba(255,255,255,.06);color:var(--muted2)}
.b-green{background:rgba(40,200,80,.1);color:#50dd80}

/* PROGRESS BAR */
.prog-section{margin-top:.75rem}
.prog-labels{display:flex;justify-content:space-between;font-size:12px;color:var(--muted2);margin-bottom:.4rem}
.prog-track{height:6px;background:var(--bg3);border-radius:99px;overflow:hidden}
.prog-fill{height:6px;background:linear-gradient(90deg,var(--lime),var(--rose));border-radius:99px;transition:width .6s ease}

/* SIGNAL */
.signal{height:1px;background:linear-gradient(90deg,transparent,var(--rose) 25%,var(--lime) 75%,transparent);opacity:.2}

/* MAIN */
.main{max-width:800px;margin:0 auto;padding:2rem 1.75rem}
.section-block{margin-bottom:2.5rem}
.section-title{font-family:'Bricolage Grotesque',sans-serif;font-size:15px;font-weight:700;letter-spacing:-.01em;margin-bottom:1rem;display:flex;align-items:center;gap:8px}
.section-title::before{content:'';width:16px;height:1px;background:var(--lime)}

/* ETAPAS */
.etapa-flow{display:flex;gap:0;margin-bottom:1.5rem;overflow-x:auto;padding-bottom:.25rem}
.etapa-step{flex:1;min-width:100px;text-align:center;position:relative}
.etapa-step:not(:last-child)::after{content:'';position:absolute;top:14px;right:0;width:50%;height:1.5px;background:var(--border2);z-index:0}
.etapa-step:not(:last-child)::before{content:'';position:absolute;top:14px;left:50%;width:50%;height:1.5px;background:var(--border2);z-index:0}
.etapa-step.done:not(:last-child)::after{background:var(--lime);opacity:.5}
.etapa-circle{width:28px;height:28px;border-radius:50%;border:1.5px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;margin:0 auto .4rem;position:relative;z-index:1;background:var(--bg);transition:all .3s}
.etapa-step.done .etapa-circle{background:var(--lime);border-color:var(--lime);color:#060708}
.etapa-step.current .etapa-circle{background:rgba(170,204,42,.1);border-color:var(--lime);color:var(--lime)}
.etapa-label{font-size:11px;color:var(--muted2);line-height:1.3}
.etapa-step.done .etapa-label{color:var(--lime)}
.etapa-step.current .etapa-label{color:var(--white);font-weight:500}

/* CHECKLIST */
.checklist-etapa{background:var(--bg2);border:0.5px solid var(--border);border-radius:12px;margin-bottom:8px;overflow:hidden}
.checklist-head{display:flex;align-items:center;justify-content:space-between;padding:.875rem 1.25rem}
.checklist-name{font-family:'Bricolage Grotesque',sans-serif;font-size:14px;font-weight:700;letter-spacing:-.01em}
.prog-mini-wrap{display:flex;align-items:center;gap:8px}
.prog-mini-track{width:50px;height:3px;background:var(--bg3);border-radius:99px;overflow:hidden}
.prog-mini-fill{height:3px;background:var(--lime);border-radius:99px}
.prog-mini-text{font-size:11px;color:var(--muted2)}
.checklist-body{padding:0 1.25rem .875rem;border-top:0.5px solid var(--border)}
.tarea-row{display:flex;align-items:flex-start;gap:.75rem;padding:.5rem 0;border-bottom:0.5px solid var(--border)}
.tarea-row:last-child{border-bottom:none}
.tarea-icon{width:18px;height:18px;border-radius:50%;flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;font-size:10px}
.tarea-icon.done{background:rgba(170,204,42,.15);color:var(--lime)}
.tarea-icon.pending{background:rgba(255,255,255,.05);color:var(--muted)}
.tarea-name{font-size:13px;line-height:1.3}
.tarea-name.done{color:var(--muted2);text-decoration:line-through}

/* HITOS */
.hito-item{background:var(--bg2);border:0.5px solid var(--border);border-radius:12px;padding:1.25rem;margin-bottom:8px;display:flex;align-items:center;gap:1rem}
.hito-item.pagado{border-color:rgba(170,204,42,.2);background:rgba(170,204,42,.03)}
.hito-item.vencido{border-color:rgba(196,56,107,.2)}
.hito-num{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}
.hito-num.pendiente{background:rgba(255,255,255,.06);color:var(--muted2)}
.hito-num.facturado{background:rgba(100,150,255,.1);color:#88aaff}
.hito-num.pagado{background:rgba(170,204,42,.15);color:var(--lime)}
.hito-num.vencido{background:rgba(196,56,107,.1);color:var(--rose2)}
.hito-info{flex:1}
.hito-name{font-size:14px;font-weight:500;color:var(--white);margin-bottom:.2rem}
.hito-desc{font-size:12px;color:var(--muted2);margin-bottom:.3rem}
.hito-fecha{font-size:11px;color:var(--muted)}
.hito-right{text-align:right;flex-shrink:0}
.hito-monto{font-family:'Bricolage Grotesque',sans-serif;font-size:18px;font-weight:800;color:var(--white)}
.hito-pct{font-size:11px;color:var(--muted2)}
.hito-docs{display:flex;gap:6px;margin-top:.4rem;justify-content:flex-end}
.hito-doc-link{font-size:10px;padding:2px 8px;border-radius:99px;text-decoration:none;transition:opacity .2s}
.hito-doc-link:hover{opacity:.7}
.hito-doc-link.factura{background:rgba(170,204,42,.1);color:var(--lime)}
.hito-doc-link.comprobante{background:rgba(100,150,255,.1);color:#88aaff}

/* DOCUMENTOS */
.doc-item{display:flex;align-items:center;justify-content:space-between;padding:.875rem 1.25rem;background:var(--bg2);border:0.5px solid var(--border);border-radius:10px;margin-bottom:6px;transition:border-color .2s}
.doc-item:hover{border-color:var(--border2)}
.doc-icon{width:32px;height:32px;border-radius:8px;background:rgba(255,255,255,.06);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.doc-info{flex:1;margin-left:.75rem}
.doc-name{font-size:13px;font-weight:500;color:var(--white)}
.doc-meta{font-size:11px;color:var(--muted2);margin-top:1px}
.doc-link{font-size:12px;padding:5px 14px;border-radius:99px;background:rgba(170,204,42,.1);color:var(--lime);text-decoration:none;transition:all .2s;flex-shrink:0}
.doc-link:hover{background:rgba(170,204,42,.2)}

/* CONTACTO */
.contacto-card{background:var(--bg2);border:0.5px solid var(--border);border-radius:16px;padding:1.5rem;display:flex;align-items:center;gap:1.25rem}
.contacto-avatar{width:52px;height:52px;border-radius:50%;background:linear-gradient(135deg,var(--lime),var(--rose));display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:800;color:#060708;flex-shrink:0}
.contacto-data{flex:1}
.contacto-name{font-family:'Bricolage Grotesque',sans-serif;font-size:17px;font-weight:700;margin-bottom:.2rem}
.contacto-titulo{font-size:13px;color:var(--muted2);margin-bottom:.6rem}
.contacto-links{display:flex;gap:8px;flex-wrap:wrap}
.contacto-link{font-size:12px;padding:5px 14px;border-radius:99px;border:0.5px solid var(--border2);color:var(--muted2);text-decoration:none;transition:all .2s}
.contacto-link:hover{color:var(--white);border-color:rgba(255,255,255,.3)}

/* NOT FOUND */
.not-found{text-align:center;padding:4rem 2rem}
.not-found h2{font-family:'Bricolage Grotesque',sans-serif;font-size:24px;font-weight:700;margin-bottom:.75rem}
.not-found p{color:var(--muted2);font-size:14px}

/* LOADING */
.loading{display:flex;align-items:center;justify-content:center;min-height:60vh;flex-direction:column;gap:.75rem;color:var(--muted2)}
.spin{width:20px;height:20px;border:2px solid var(--border2);border-top-color:var(--lime);border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* FOOTER */
.footer{padding:2rem 1.75rem;border-top:0.5px solid var(--border);text-align:center;font-size:12px;color:var(--muted)}
</style>
</head>
<body>

<div id="root">
  <div class="loading"><div class="spin"></div><span>Cargando tu proyecto...</span></div>
</div>

<script>
const SUPABASE_URL='https://qvquoadbkztbrxfclfmt.supabase.co';
const SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF2cXVvYWRia3p0YnJ4ZmNsZm10Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ3MDYzMDIsImV4cCI6MjA5MDI4MjMwMn0.uM7FzCllWvH5ic4RHxo7aoDnK2a9HcKGz1m6MSrP_Dg';
const sb=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);

// Lee el proyecto ID desde ?p=UUID en la URL
const params=new URLSearchParams(window.location.search);
const proyectoId=params.get('p');

async function init(){
  if(!proyectoId){renderNotFound();return}
  const[{data:proyecto},{data:tareas},{data:hitos},{data:docs}]=await Promise.all([
    sb.from('proyectos').select('*,empresas(nombre,contacto,email,telefono)').eq('id',proyectoId).single(),
    sb.from('tareas').select('*').eq('proyecto_id',proyectoId).order('etapa_numero'),
    sb.from('hitos_facturacion').select('*').eq('proyecto_id',proyectoId).eq('visible_cliente',true).order('orden'),
    sb.from('documentos').select('*').eq('proyecto_id',proyectoId).order('created_at',{ascending:false})
  ]);
  if(!proyecto){renderNotFound();return}
  render(proyecto,tareas||[],hitos||[],docs||[]);
}

function render(p,tareas,hitos,docs){
  // Agrupar tareas por etapa
  const etapasMap={};
  tareas.forEach(t=>{
    const k=t.etapa_numero||1;
    if(!etapasMap[k])etapasMap[k]={nombre:t.etapa_nombre||`Etapa ${k}`,tareas:[]};
    etapasMap[k].tareas.push(t);
  });
  const totalTareas=tareas.length;
  const doneTareas=tareas.filter(t=>t.completada).length;
  const pctGeneral=totalTareas?Math.round(doneTareas/totalTareas*100):0;

  // Etapas del flujo
  const etapasFlow=[
    {key:'prospecto',label:'Evaluación'},
    {key:'formulando',label:'Formulación'},
    {key:'enviado',label:'Enviado'},
    {key:'adjudicado',label:'Adjudicado'}
  ];
  const etapaIdx=etapasFlow.findIndex(e=>e.key===p.etapa);

  // Hitos financieros
  const totalMonto=hitos.reduce((s,h)=>s+(h.monto||0),0);
  const pagadoMonto=hitos.filter(h=>h.estado==='pagado').reduce((s,h)=>s+(h.monto||0),0);
  const pctPago=totalMonto?Math.round(pagadoMonto/totalMonto*100):0;

  document.getElementById('root').innerHTML=`
    <!-- TOPBAR -->
    <div class="topbar">
      <div class="topbar-logo">Mielina</div>
      <div class="topbar-contact">
        <div class="contact-avatar">CM</div>
        <div class="contact-info">
          <div class="contact-name">Carlos Madrid</div>
          <div class="contact-role">Consultor I+D+i</div>
        </div>
        <a href="https://calendly.com/carlosmadridgomez" target="_blank" class="contact-btn">Agendar →</a>
      </div>
    </div>

    <!-- HERO -->
    <div class="hero">
      <div class="hero-top">
        <div>
          <div class="empresa-name">${p.empresas?.nombre||'Tu empresa'}</div>
          <div class="proyecto-name">${p.nombre} · ${p.instrumento||''}</div>
        </div>
        <div>${badgeEtapa(p.etapa)}</div>
      </div>
      <div class="prog-section">
        <div class="prog-labels">
          <span>Avance del proyecto</span>
          <span>${pctGeneral}% completado</span>
        </div>
        <div class="prog-track"><div class="prog-fill" style="width:${pctGeneral}%"></div></div>
      </div>
    </div>

    <div class="signal"></div>

    <!-- MAIN -->
    <div class="main">

      <!-- ETAPAS FLOW -->
      <div class="section-block">
        <div class="section-title">Estado del proyecto</div>
        <div class="etapa-flow">
          ${etapasFlow.map((e,i)=>{
            const isDone=i<etapaIdx;
            const isCurrent=i===etapaIdx;
            return`<div class="etapa-step ${isDone?'done':isCurrent?'current':''}">
              <div class="etapa-circle">${isDone?'✓':i+1}</div>
              <div class="etapa-label">${e.label}</div>
            </div>`;
          }).join('')}
        </div>
        ${p.fecha_cierre?`<div style="font-size:13px;color:var(--muted2);margin-top:.5rem">
          Fecha cierre convocatoria: <span style="${diasColor(p.fecha_cierre)};font-weight:500">${formatFecha(p.fecha_cierre)}${diasRestantes(p.fecha_cierre)}</span>
        </div>`:''}
      </div>

      <!-- CHECKLIST -->
      ${Object.keys(etapasMap).length?`
      <div class="section-block">
        <div class="section-title">Avance técnico</div>
        ${Object.entries(etapasMap).map(([num,etapa])=>{
          const total=etapa.tareas.length,done=etapa.tareas.filter(t=>t.completada).length,pct=total?Math.round(done/total*100):0;
          return`<div class="checklist-etapa">
            <div class="checklist-head">
              <div class="checklist-name">${num}. ${etapa.nombre}</div>
              <div class="prog-mini-wrap">
                <div class="prog-mini-track"><div class="prog-mini-fill" style="width:${pct}%"></div></div>
                <div class="prog-mini-text">${done}/${total}</div>
              </div>
            </div>
            <div class="checklist-body">
              ${etapa.tareas.map(t=>`
                <div class="tarea-row">
                  <div class="tarea-icon ${t.completada?'done':'pending'}">${t.completada?'✓':'○'}</div>
                  <div class="tarea-name ${t.completada?'done':''}">${t.nombre}</div>
                </div>`).join('')}
            </div>
          </div>`;
        }).join('')}
      </div>`:''}

      <!-- HITOS FACTURACIÓN -->
      ${hitos.length?`
      <div class="section-block">
        <div class="section-title">Hitos de facturación</div>
        ${totalMonto?`<div style="margin-bottom:1rem">
          <div style="display:flex;justify-content:space-between;font-size:12px;color:var(--muted2);margin-bottom:.4rem">
            <span>Pagado</span>
            <span style="color:var(--lime);font-weight:600">$${fmt(pagadoMonto)} / $${fmt(totalMonto)} (${pctPago}%)</span>
          </div>
          <div style="height:4px;background:var(--bg3);border-radius:99px;overflow:hidden">
            <div style="height:4px;background:linear-gradient(90deg,var(--lime),var(--rose));border-radius:99px;width:${pctPago}%"></div>
          </div>
        </div>`:''}
        ${hitos.map(h=>`
          <div class="hito-item ${h.estado}">
            <div class="hito-num ${h.estado}">${h.orden}</div>
            <div class="hito-info">
              <div class="hito-name">${h.nombre}</div>
              ${h.descripcion?`<div class="hito-desc">${h.descripcion}</div>`:''}
              <div class="hito-fecha">
                ${h.fecha_estimada?`Fecha estimada: ${formatFecha(h.fecha_estimada)}`:''}
                ${h.fecha_real?` · Pagado: ${formatFecha(h.fecha_real)}`:''}
              </div>
            </div>
            <div class="hito-right">
              ${h.monto?`<div class="hito-monto">$${fmt(h.monto)}</div>`:''}
              ${h.porcentaje?`<div class="hito-pct">${h.porcentaje}% del total</div>`:''}
              <div style="margin-top:.3rem">${badgeHito(h.estado)}</div>
              <div class="hito-docs">
                ${h.factura_url?`<a href="${h.factura_url}" target="_blank" class="hito-doc-link factura">Factura</a>`:''}
                ${h.comprobante_url?`<a href="${h.comprobante_url}" target="_blank" class="hito-doc-link comprobante">Comprobante</a>`:''}
              </div>
            </div>
          </div>`).join('')}
      </div>`:''}

      <!-- DOCUMENTOS -->
      ${docs.length?`
      <div class="section-block">
        <div class="section-title">Documentos compartidos</div>
        ${docs.map(d=>`
          <div class="doc-item">
            <div class="doc-icon">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--muted2)" stroke-width="1.5" stroke-linecap="round"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
            </div>
            <div class="doc-info">
              <div class="doc-name">${d.nombre}</div>
              <div class="doc-meta">${d.tipo||''} ${d.notas?'· '+d.notas:''}</div>
            </div>
            ${d.url?`<a href="${d.url}" target="_blank" class="doc-link">Abrir →</a>`:''}
          </div>`).join('')}
      </div>`:''}

      <!-- CONTACTO -->
      <div class="section-block">
        <div class="section-title">Tu consultor</div>
        <div class="contacto-card">
          <div class="contacto-avatar">CM</div>
          <div class="contacto-data">
            <div class="contacto-name">Carlos Madrid Gómez</div>
            <div class="contacto-titulo">Consultor en I+D+i · Estrategia e Innovación · Chile</div>
            <div class="contacto-links">
              <a href="https://calendly.com/carlosmadridgomez" target="_blank" class="contacto-link">Agendar reunión</a>
              <a href="mailto:carlosmadridgomez@gmail.com" class="contacto-link">Email</a>
              <a href="https://linkedin.com/in/carlosmadridgomez" target="_blank" class="contacto-link">LinkedIn</a>
            </div>
          </div>
        </div>
      </div>

    </div>

    <div class="footer">
      Mielina · Plataforma de gestión de proyectos de innovación · Chile
    </div>
  `;
}

function renderNotFound(){
  document.getElementById('root').innerHTML=`
    <div class="topbar"><div class="topbar-logo">Mielina</div></div>
    <div class="not-found">
      <h2>Proyecto no encontrado</h2>
      <p>El link que usaste no corresponde a ningún proyecto activo.<br>Contacta a Carlos para obtener tu link correcto.</p>
    </div>`;
}

function fmt(n){
  if(!n)return'0';
  if(n>=1000000)return(n/1000000).toFixed(1)+'M';
  if(n>=1000)return(n/1000).toFixed(0)+'K';
  return n.toLocaleString('es-CL');
}

function formatFecha(f){
  if(!f)return'—';
  const[y,m,d]=f.substring(0,10).split('-');
  return new Date(+y,+m-1,+d).toLocaleDateString('es-CL',{day:'numeric',month:'short',year:'numeric'});
}

function diasColor(f){
  if(!f)return'';
  const d=Math.ceil((new Date(f)-new Date())/(1000*60*60*24));
  return d<=7?'color:var(--rose2)':d<=21?'color:#f0a030':'color:var(--muted2)';
}

function diasRestantes(f){
  if(!f)return'';
  const d=Math.ceil((new Date(f)-new Date())/(1000*60*60*24));
  if(d<0)return' (vencida)';
  return` · ${d} días restantes`;
}

function badgeEtapa(e){
  const cls={prospecto:'b-blue',formulando:'b-lime',enviado:'b-rose',adjudicado:'b-green',rechazado:'b-gray'};
  const lbl={prospecto:'En evaluación',formulando:'En formulación',enviado:'Enviado',adjudicado:'Adjudicado',rechazado:'No adjudicado'};
  return`<span class="badge ${cls[e]||'b-gray'}">${lbl[e]||e}</span>`;
}

function badgeHito(e){
  const cls={pendiente:'b-gray',facturado:'b-blue',pagado:'b-lime',vencido:'b-rose'};
  const lbl={pendiente:'Pendiente',facturado:'Facturado',pagado:'Pagado',vencido:'Vencido'};
  return`<span class="badge ${cls[e]||'b-gray'}" style="font-size:10px">${lbl[e]||e}</span>`;
}
